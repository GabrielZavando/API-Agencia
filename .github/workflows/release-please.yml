on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: master
          config-file: Api/release-please-config.json
          manifest-file: Api/.release-please-manifest.json

      - name: Enrich Release Notes with AI
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ steps.release.outputs.tag_name }}';
            const body = '${{ steps.release.outputs.body }}';
            // Aquí iría el script que llama a la API de OpenAI para mejorar las notas
            // usando el log de commits y el modelo gpt-5.4.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: 'gpt-5.4' # Confirmado por el usuario
